<script>
const letters = ["A", "B", "C", "D"];
const setSelect = document.getElementById("setSelect");
sets.forEach((_, i) => {
  const opt = document.createElement("option");
  opt.value = String(i);
  opt.textContent = `Set ${i + 1}`;
  setSelect.appendChild(opt);
});

function currentSet() {
  return sets[Number(setSelect.value)];
}

function loadSet() {
  const quiz = document.getElementById("quiz");
  quiz.innerHTML = "";
  document.getElementById("score").textContent = "";
  currentSet().forEach((item, idx) => {
    const [topic, question, options] = item;
    const section = document.createElement("section");
    section.className = "question";
    section.innerHTML = `
      <div class="meta">Set ${Number(setSelect.value) + 1} · Question ${idx + 1} · ${topic} · 1 point</div>
      <h2>${escapeHtml(question)}</h2>
      <div class="options">
        ${options.map((op, i) => `
          <label><input type="radio" name="q${idx}" value="${i}"> ${letters[i]}. ${escapeHtml(op)}</label>
        `).join("")}
      </div>
      <div class="feedback" id="f${idx}"></div>
    `;
    quiz.appendChild(section);
  });
}

function grade() {
  let score = 0;
  currentSet().forEach((item, idx) => {
    const answer = item[3];
    const selected = document.querySelector(`input[name="q${idx}"]:checked`);
    const fb = document.getElementById(`f${idx}`);
    if (selected && Number(selected.value) === answer) {
      score += 1;
      fb.textContent = "Correct.";
      fb.className = "feedback correct";
    } else {
      fb.textContent = `Wrong. Correct answer: ${letters[answer]}. ${item[2][answer]}`;
      fb.className = "feedback wrong";
    }
  });
  document.getElementById("score").textContent = `Score: ${score} / 20`;
  window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
}

function showAnswers() {
  currentSet().forEach((item, idx) => {
    const answer = item[3];
    const fb = document.getElementById(`f${idx}`);
    if (fb) {
      fb.textContent = `Answer: ${letters[answer]}. ${item[2][answer]}`;
      fb.className = "feedback";
    }
  });
}

function resetSet() {
  loadSet();
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

loadSet();
</script>
